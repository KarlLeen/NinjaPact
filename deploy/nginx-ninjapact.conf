# NinjaPact nginx site config
# Place at: /etc/nginx/sites-available/ninjapact  (then symlink into sites-enabled)
# After installing this as an HTTP server block, run:
#   sudo certbot --nginx -d www.limlamleen.com
# certbot will rewrite this file to add the SSL (443) block + HTTP→HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name www.limlamleen.com;

    # Frontend static PWA (Vite build output)
    root /var/www/ninjapact/frontend/dist;
    index index.html;

    # SPA routing — all unknown paths fall back to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
    }

    location /assets/ {
        gzip on;
        gzip_types application/javascript text/css;
        gzip_min_length 256;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Judge service reverse proxy: /api/* → http://localhost:3001/*
    # (trailing slash on proxy_pass strips the /api prefix)
    location /api/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Largest request is either an evidence photo (base64-in-JSON, express.json 10mb)
        # or an escrow source upload (multipart, multer cap 10 MB). 12m covers both with
        # headroom. Keep in sync with judge/src/index.ts (express.json + multer limits).
        client_max_body_size 12m;

        # GLM verdict + on-chain submit can take a while
        proxy_read_timeout 120s;
    }
}
