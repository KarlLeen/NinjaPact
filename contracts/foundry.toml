[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Optimize for deployed-bytecode size — the code-escrow state machine pushes NinjaPact
# past the 24576-byte EIP-170 limit unoptimized. Low runs favors size over runtime gas.
optimizer = true
optimizer_runs = 1
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
