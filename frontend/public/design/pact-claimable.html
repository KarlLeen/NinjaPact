<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>承诺 #9 · 可领取</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-claim">可领取</span>
    </header>

    <div class="status-panel accent">
      <div class="status-mark jade">解</div>
      <h2>可以领取了</h2>
      <p class="status-lede">锁定期已满，200 mUSD 已解锁，可原路退还至钱包。</p>
      <button type="button" class="btn btn-primary btn-block">领取 200 mUSD</button>
    </div>

    <div class="summary-card" style="margin-top: var(--sp-4); text-align: left;">
      <span class="kind-tag mode-solo">自律打卡 · 承诺 #9</span>
      <h2 class="title" style="font-size: 16px; margin-top: var(--sp-2);">每日冥想 20 分钟</h2>
      <div class="divider" style="margin: var(--sp-3) 0;"></div>
      <div class="stat-row"><span class="subtitle">最终成绩</span><span class="stat-value" style="color: var(--fail);">失败</span></div>
      <div class="stat-row"><span class="subtitle">通过 / 失败</span><span class="stat-value">7 / 3</span></div>
    </div>
  </div>
</body>
</html>
