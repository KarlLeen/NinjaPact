<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托管 #6 · 已退款</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-settled">已结算</span>
    </header>

    <div class="status-panel">
      <div class="status-mark">返</div>
      <h2>已退款</h2>
      <p class="status-lede">终局裁决：交付未达验收标准。600 mUSD 已原路退回你的钱包。</p>
    </div>

    <div class="summary-card" style="margin-top: var(--sp-4); text-align: left;">
      <span class="kind-tag mode-escrow">交付托管 · 委托 #6</span>
      <h2 class="title" style="font-size: 16px; margin-top: var(--sp-2);">NFT 市场筛选器组件</h2>
      <div class="stat-row"><span class="subtitle">裁决结果</span><span class="stat-value" style="color: var(--fail);">未达标</span></div>
      <div class="stat-row"><span class="subtitle">退款金额</span><span class="stat-value" style="color: var(--gold);">600 mUSD</span></div>
    </div>
  </div>
</body>
</html>
