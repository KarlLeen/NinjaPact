<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托管 #10 · 待托管</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-funding">待资金</span>
    </header>

    <div class="summary-card">
      <span class="kind-tag mode-escrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 12h8M12 8v8"/><rect x="4" y="6" width="16" height="12" rx="2"/></svg>

      </span>
      <h1 class="title">交付 Privy 钱包 SDK 集成示例，含 Injective 链上读写 demo</h1>

      <div class="stat-row"><span class="subtitle">托管金额</span><span class="stat-value" style="color: var(--gold);">500 mUSD</span></div>
    </div>

    <div class="status-panel accent">
      <div class="status-mark gold">托</div>
      <h2>委托已创建，资金尚未托管</h2>
      <p class="status-lede">托管 mUSD 后才会生成交付方邀请链接，交付方接受后才开始编写。</p>
      <button type="button" class="btn btn-primary btn-block">托管 500 mUSD</button>
    </div>
  </div>
