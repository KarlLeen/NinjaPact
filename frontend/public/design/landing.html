<!doctype html>
<html lang="zh-CN">
<head>

<body>
  <div class="app-shell screen-centered landing-layout">

      </div>

      <h1 class="display" style="margin-bottom: 12px;">忍者之约</h1>

    <div class="stack landing-actions">
      <button type="button" class="btn btn-primary btn-block" id="enter-btn">

  <script>
    document.getElementById('enter-btn').addEventListener('click', function () {
      window.location.href = 'dashboard.html';
    });
