<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>托管 #8 · 等待交付</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen screen-detail">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-phase">等待交付</span>
    </header>

    <main class="detail-layout wait-detail" aria-label="托管详情">
      <div class="detail-main">
        <div class="detail-hero mode-escrow-hero">
          <div class="detail-meta-row">
            <span class="kind-tag mode-escrow">交付托管 · 委托 #8</span>
            <span class="stake-tag">300 mUSD</span>
          </div>
          <h1 class="title">交付 Injective 前端集成模块，含 Privy 登录与合约读写的 demo</h1>
          <div class="phase-track" style="margin-top: var(--sp-4);">
            <div class="phase-step done"><span class="phase-dot"></span>托管</div>
            <div class="phase-step done"><span class="phase-dot"></span>接单</div>
            <div class="phase-step active"><span class="phase-dot"></span>交付</div>
            <div class="phase-step pending"><span class="phase-dot"></span>验收</div>
            <div class="phase-step pending"><span class="phase-dot"></span>放款</div>
          </div>
          <div class="hero-stat-grid">
            <div class="stat-row"><span class="subtitle">交付方</span><span class="stat-value">0x7a3f…c821</span></div>
            <div class="stat-row"><span class="subtitle">接受时间</span><span class="stat-value">2026-06-25</span></div>
          </div>
        </div>

        <div class="status-panel status-panel--row-desktop">
          <div class="status-icon-lg">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </div>
          <h2>交付方已接受，等待交付</h2>
          <p class="status-lede">交付方正在编写并准备源码 zip + 可测 demo 链接。提交后你会进入验收阶段。</p>
        </div>
      </div>

      <aside class="detail-sidebar desktop-only" aria-label="侧栏信息">
        <div class="sidebar-card">
          <p class="label section-label">委托摘要</p>
          <dl class="contract-dl">
            <div class="contract-row"><dt>托管金额</dt><dd class="mono-gold">300 mUSD</dd></div>
            <div class="contract-row"><dt>交付方</dt><dd class="mono text-dim-sm">0x7a3f…c821</dd></div>
            <div class="contract-row"><dt>当前阶段</dt><dd>等待交付</dd></div>
          </dl>
        </div>
        <div class="sidebar-card sidebar-tip">
          <p class="label section-label">下一步</p>
          <p class="sidebar-tip-text">交付方提交源码 zip 与 demo 后，你会收到通知并进入验收阶段。</p>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
