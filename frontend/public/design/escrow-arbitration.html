<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托管 #6 · 终局裁决</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-locked">终局裁决中</span>
    </header>

    <div class="summary-card">
      <span class="kind-tag mode-escrow">交付托管 · 委托 #6</span>
      <h1 class="title">交付 NFT 市场筛选器组件，支持链上 metadata 解析</h1>
      <div class="phase-track" style="margin-top: var(--sp-4);">
        <div class="phase-step done"><span class="phase-dot"></span>托管</div>
        <div class="phase-step done"><span class="phase-dot"></span>接单</div>
        <div class="phase-step done"><span class="phase-dot"></span>交付</div>
        <div class="phase-step done"><span class="phase-dot"></span>验收</div>
        <div class="phase-step active"><span class="phase-dot"></span>裁决</div>
      </div>
      <div class="stat-row" style="margin-top: var(--sp-3);"><span class="subtitle">修改次数</span><span class="stat-value">1/1 已用尽</span></div>
    </div>

    <div class="status-panel warn">
      <div class="status-icon-lg" style="border-style: solid; border-color: var(--gold-line); color: var(--gold);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 3v18M3 12h18"/><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <h2>AI 终局裁决中</h2>
      <p class="status-lede">修改次数已用尽。AI Judge 正对照原始验收标准做终局裁决——达标则放款给交付方，不达标则退款给你。</p>
      <p class="label" style="margin-top: var(--sp-3); text-transform: none;">通常 1–3 分钟内完成 · 请稍后刷新</p>
    </div>
  </div>
</body>
</html>
