<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>托管 #10 · 等待接单</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-funding">等待入伙</span>
    </header>

    <div class="summary-card">
      <span class="kind-tag mode-escrow">交付托管 · 委托 #10</span>
      <h1 class="title">交付 Privy 钱包 SDK 集成示例，含 Injective 链上读写 demo</h1>
      <div class="phase-track" style="margin-top: var(--sp-4);">
        <div class="phase-step done"><span class="phase-dot"></span>托管</div>
        <div class="phase-step active"><span class="phase-dot"></span>接单</div>
        <div class="phase-step pending"><span class="phase-dot"></span>交付</div>
        <div class="phase-step pending"><span class="phase-dot"></span>验收</div>
        <div class="phase-step pending"><span class="phase-dot"></span>放款</div>
      </div>
      <div class="stat-row" style="margin-top: var(--sp-3);"><span class="subtitle">交付方</span><span class="stat-value" style="color: var(--text-muted);">待接受</span></div>
      <div class="stat-row"><span class="subtitle">托管金额</span><span class="stat-value" style="color: var(--gold);">500 mUSD</span></div>
    </div>

    <div class="invite-card">
      <p class="invite-title">交付方邀请</p>
      <p class="invite-lede">把链接发给交付方。Ta 接受后交付源码 + 可测 demo，你验收通过托管金才放款。凭证只在链接里（# 后）。</p>
      <button type="button" class="btn btn-primary btn-block" id="copy-btn">复制交付邀请链接</button>
    </div>

    <div class="status-panel" style="margin-top: var(--sp-4);">
      <div class="status-icon-lg">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h2>等待交付方接受委托</h2>
      <p class="status-lede">对方接受后进入编写阶段，你会收到链上通知。</p>
    </div>
  </div>
  <script>
    document.getElementById('copy-btn').addEventListener('click', function () {
      this.textContent = '已复制链接';
      setTimeout(function () { document.getElementById('copy-btn').textContent = '复制交付邀请链接'; }, 2000);
    });
  </script>
</body>
</html>
