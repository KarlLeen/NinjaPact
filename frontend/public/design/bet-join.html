<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>接受对赌 · #16</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <span class="title" style="font-size: 18px;">公共事件对赌</span>
      <span class="state-badge s-funding">待接受</span>
    </header>

    <div class="summary-card">
      <span class="kind-tag mode-bet">对赌 #16</span>
      <h1 class="title">2026 年 Q3 结束前，Solana 日活地址是否超过 400 万？</h1>
      <div class="bet-sides" style="margin-top: var(--sp-4);">
        <div class="bet-side yes">
          <p class="label">发起方 0x5589…9Bd2</p>
          <p class="bet-side-label">YES · 会发生</p>
          <p class="bet-side-stake mono">150 mUSD</p>
        </div>
        <div class="bet-vs" aria-hidden="true">VS</div>
        <div class="bet-side no">
          <p class="label">你 · 对手</p>
          <p class="bet-side-label">NO · 不会发生</p>
          <p class="bet-side-stake mono">150 mUSD</p>
        </div>
      </div>
      <div class="stat-row" style="margin-top: var(--sp-3);"><span class="subtitle">裁定截止</span><span class="stat-value">2026-09-30</span></div>
      <div class="stat-row"><span class="subtitle">赢家通吃</span><span class="stat-value" style="color: var(--gold);">300 mUSD</span></div>
    </div>

    <div class="status-panel accent">
      <p class="status-lede" style="margin-bottom: var(--sp-4);">对方押「YES 会发生」并锁定了 150 mUSD。你押「NO 不会发生」，押等额 150 mUSD 接受。到期由 AI 裁判查证结果，赢家拿走奖池。</p>
      <button type="button" class="btn btn-primary btn-block">押 150 mUSD 接受</button>
    </div>
  </div>
</body>
</html>
