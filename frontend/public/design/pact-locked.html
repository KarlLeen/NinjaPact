<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>承诺 #9 · 锁定中</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell screen">
    <header class="top-nav" style="border: none; margin-bottom: var(--sp-3);">
      <button type="button" class="nav-back" onclick="location.href='dashboard.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        返回
      </button>
      <span class="state-badge s-locked">锁定中</span>
    </header>

    <div class="status-panel warn">
      <div class="status-mark gold">锁</div>
      <h2 style="color: var(--gold);">承诺未完成</h2>
      <p class="status-lede">失败次数达到阈值。200 mUSD 锁定 6 个月，到期可原路领取。</p>
      <p class="countdown-mono">142 天 08:16:33</p>
      <p class="label" style="text-transform: none;">解锁时间 2026-12-28</p>
    </div>

    <div class="summary-card" style="margin-top: var(--sp-4); text-align: left;">
      <div class="stat-row"><span class="subtitle">承诺</span><span class="stat-value" style="font-size: 12px;">每日冥想 20 分钟</span></div>
      <div class="stat-row"><span class="subtitle">通过 / 失败</span><span class="stat-value"><span style="color: var(--jade);">7</span> / <span style="color: var(--fail);">3</span></span></div>
      <div class="stat-row"><span class="subtitle">锁定金额</span><span class="stat-value" style="color: var(--gold);">200 mUSD</span></div>
    </div>

    <div class="redeem-card">
      <h3>救赎之道</h3>
      <p class="subtitle" style="font-size: 13px; margin-bottom: var(--sp-3);">完成一个新承诺并用它救赎此失败——立即解锁，无需等待 6 个月。</p>
      <button type="button" class="btn btn-primary btn-block">用已成功的承诺救赎</button>
    </div>
  </div>
</body>
</html>
